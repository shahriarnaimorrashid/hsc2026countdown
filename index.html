<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MISSION HSC 26 — Shahriar Naim</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─────────────── TOKENS ─────────────── */
:root {
  --c:  #0099ff;
  --r:  #ff3366;
  --g:  #ffaa00;
  --p:  #8b5cf6;
  --bg: #f8fafd;
  --surface: rgba(255,255,255,0.7);
  --border: rgba(0,0,0,0.06);
  --tx: #1a1e2b;
  --mu: #64748b;
  --card-bg: rgba(255,255,255,0.65);
  --shadow-sm: 0 8px 20px -6px rgba(0,0,0,0.05), 0 4px 8px -4px rgba(0,0,0,0.03);
  --shadow-md: 0 20px 30px -12px rgba(0,0,0,0.08), 0 8px 12px -6px rgba(0,0,0,0.04);
  --radius-card: 28px;
  --radius-pill: 60px;
  --ease: cubic-bezier(0.23, 1, 0.32, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

body.dark-mode {
  --bg: #0b0e14;
  --surface: rgba(20, 28, 40, 0.7);
  --border: rgba(255,255,255,0.06);
  --tx: #eef2fb;
  --mu: #8f9eb5;
  --card-bg: rgba(15, 22, 36, 0.7);
  --shadow-sm: 0 8px 20px -6px rgba(0,0,0,0.3);
  --shadow-md: 0 20px 30px -12px rgba(0,0,0,0.5);
}

/* ─────────────── RESET & BASE ─────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--tx);
  font-family:'Plus Jakarta Sans', sans-serif;
  overflow-x:hidden;
  transition: background-color 0.3s ease, color 0.2s ease;
}

/* ─────────────── RGB PARTICLE CANVAS ─────────────── */
#cvs{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0.6;
  will-change:transform;
}
body.dark-mode #cvs{opacity:0.8;}

/* ─────────────── BACKGROUND MESH ─────────────── */
.mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,153,255,0.04) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,51,102,0.04) 0%, transparent 45%),
    radial-gradient(circle at 40% 80%, rgba(139,92,246,0.03) 0%, transparent 50%);
  animation:meshBreathing 18s infinite alternate;
}
@keyframes meshBreathing{0%{opacity:0.6;transform:scale(1)}100%{opacity:1;transform:scale(1.02)}}

/* ─────────────── CONTROL BAR (Top-Right) ─────────────── */
.control-bar{
  position:fixed;top:20px;right:20px;z-index:100;
  display:flex;gap:5px;
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--radius-pill);
  padding:5px;
  box-shadow:var(--shadow-sm);
}
.ctrl-btn{
  background:transparent;border:none;
  color:var(--tx);font-family:'Space Grotesk',monospace;
  font-size:0.75rem;font-weight:600;letter-spacing:0.3px;
  padding:8px 18px;border-radius:40px;
  cursor:pointer;transition:all 0.2s var(--ease);
  text-transform:uppercase;display:flex;align-items:center;gap:6px;
  border:1px solid transparent;
}
.ctrl-btn i{font-style:normal;font-size:1.1em;}
.ctrl-btn:hover{background:rgba(0,153,255,0.08);border-color:var(--border);color:var(--c);}

/* ─────────────── HUD (Top-Left) ─────────────── */
.hud{
  position:fixed;z-index:10;top:24px;left:24px;
  font-family:'Space Grotesk',monospace;
  background:var(--card-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  padding:14px 22px;border-radius:30px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  display:flex;gap:24px;
  animation:fadeSlideDown 0.6s ease both;
}
.hud-item{display:flex;flex-direction:column;}
.hl{font-size:0.6rem;letter-spacing:2px;color:var(--mu);text-transform:uppercase;margin-bottom:4px;}
.hv{font-size:0.9rem;font-weight:700;color:var(--tx);}
.hv.c{color:var(--c);}
.hud-sep{width:1px;background:var(--border);margin:0 6px;}
.weather-icon{font-size:1.1rem;margin-right:4px;}

/* ─────────────── WRAPPER ─────────────── */
.wrap{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(80px,12vh,130px) clamp(16px,5vw,40px) clamp(60px,10vh,100px);
  gap:clamp(24px,4vw,40px);
}

/* ─────────────── BADGE ─────────────── */
.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--card-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:100px;
  padding:8px 24px;
  font-family:'Space Grotesk',monospace;
  font-size:0.7rem;font-weight:600;letter-spacing:2px;
  color:var(--c);
  box-shadow:var(--shadow-sm);
  animation:fadeSlideUp 0.7s ease both;
}
.bd{width:8px;height:8px;border-radius:50%;background:var(--c);animation:pulseDot 2s infinite;}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

/* ─────────────── TITLE ─────────────── */
.title{
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(3.8rem,14vw,9.5rem);
  line-height:0.9;letter-spacing:4px;
  text-align:center;color:var(--tx);
  text-transform:uppercase;
  animation:fadeSlideUp 0.75s 0.1s ease both, autoGlitch 4s ease-in-out infinite;
  user-select:none;
}
.tc{color:var(--c)}.tr{color:var(--r)}
@keyframes autoGlitch{
  0%,40%,60%,100%{text-shadow:none;clip-path:none;}
  50%{
    text-shadow:3px 0 var(--r),-3px 0 var(--c);
    clip-path:inset(12% 0 58% 0);
  }
  52%{
    text-shadow:-3px 0 var(--r),3px 0 var(--c);
    clip-path:inset(58% 0 8% 0);
  }
}

/* ─────────────── SUBTITLE ─────────────── */
.sub{
  font-family:'Space Grotesk',monospace;
  font-size:clamp(0.7rem,1.8vw,0.9rem);
  letter-spacing:3px;color:var(--mu);
  font-weight:500;
  animation:fadeSlideUp 0.75s 0.16s ease both;
}
.sub span{color:var(--g);font-weight:700;}

.divider{
  width:min(400px,85%);height:2px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  animation:fadeSlideUp 0.75s 0.2s ease both;
}

/* ─────────────── COUNTDOWN CARDS ─────────────── */
.cd{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:clamp(12px,2.5vw,20px);
  width:100%;max-width:900px;
  animation:fadeSlideUp 0.8s 0.3s ease both;
}
.card{
  position:relative;overflow:hidden;
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--radius-card);
  padding:clamp(24px,5vw,40px) clamp(8px,2vw,16px) clamp(18px,3.5vw,28px);
  text-align:center;
  box-shadow:var(--shadow-sm);
  transition:transform 0.25s var(--ease), box-shadow 0.3s, border-color 0.2s;
  animation:cardFloat 5s infinite ease-in-out;
  will-change:transform;
}
.card:nth-child(2){animation-delay:0.2s;}
.card:nth-child(3){animation-delay:0.4s;}
.card:nth-child(4){animation-delay:0.6s;}
@keyframes cardFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.card:hover{box-shadow:var(--shadow-md);border-color:rgba(0,153,255,0.2);}
.card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(circle at 30% 20%, rgba(0,153,255,0.06), transparent 70%);
  opacity:0;transition:opacity 0.5s;
}
.card:hover::before{opacity:1;}
.card-idx{
  position:absolute;top:14px;right:18px;
  font-family:'Space Grotesk',monospace;
  font-size:0.6rem;color:var(--mu);
}
.num-wrap{
  overflow:hidden;position:relative;
  height:clamp(3.8rem,9vw,6rem);
  display:flex;align-items:center;justify-content:center;
  perspective:600px;
}
.card-num{
  display:block;
  font-family:'Bebas Neue',sans-serif;
  font-weight:400;
  font-size:clamp(3.2rem,8vw,5.5rem);
  color:var(--tx);
  line-height:1;
  transition:color 0.2s;
}
.card-sec .card-num{color:var(--r);animation:softPulse 1.8s infinite;}
@keyframes softPulse{0%,100%{opacity:1}50%{opacity:0.6}}

.flip-out{animation:flipOut 0.18s ease forwards !important}
.flip-in{animation:flipIn 0.25s var(--spring) both !important}
@keyframes flipOut{0%{transform:translateY(0) rotateX(0);opacity:1}100%{transform:translateY(-20px) rotateX(15deg);opacity:0}}
@keyframes flipIn{0%{transform:translateY(20px) rotateX(-15deg);opacity:0}100%{transform:translateY(0) rotateX(0);opacity:1}}

.card-lbl{
  font-family:'Space Grotesk',monospace;
  font-size:0.6rem;font-weight:600;letter-spacing:3px;
  color:var(--mu);text-transform:uppercase;margin-top:10px;
}

/* ─────────────── PROGRESS ─────────────── */
.prog{width:100%;max-width:900px;animation:fadeSlideUp 0.8s 0.4s ease both;}
.prog-head{display:flex;justify-content:space-between;margin-bottom:12px;}
.prog-lbl{font-family:'Space Grotesk',monospace;font-size:0.65rem;letter-spacing:3px;color:var(--mu);font-weight:600;}
.prog-pct{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1.2rem;color:var(--c);}
.prog-track{height:8px;background:var(--border);border-radius:100px;overflow:hidden;}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--c),var(--p),var(--r));
  border-radius:100px;
  transition:width 1.2s var(--ease);
  position:relative;
}
.prog-fill::after{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:14px;height:14px;background:white;border-radius:50%;
  box-shadow:0 0 12px var(--c);
}

/* ─────────────── STATS ─────────────── */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:clamp(10px,2vw,16px);
  width:100%;max-width:900px;
  animation:fadeSlideUp 0.8s 0.5s ease both;
}
.stat{
  background:var(--card-bg);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:clamp(14px,3vw,22px) 8px;
  text-align:center;
  box-shadow:var(--shadow-sm);
  transition:transform 0.2s,box-shadow 0.2s;
}
.stat:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.stat-v{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.5rem,3.5vw,2rem);
  color:var(--g);
}
.stat-l{
  font-family:'Space Grotesk',monospace;
  font-size:0.5rem;font-weight:600;letter-spacing:2px;
  color:var(--mu);text-transform:uppercase;margin-top:6px;
}

/* ─────────────── QUOTE ─────────────── */
.quote{
  width:100%;max-width:900px;display:flex;gap:18px;
  background:var(--card-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:28px;
  padding:clamp(20px,3.5vw,30px) clamp(18px,3vw,28px);
  box-shadow:var(--shadow-sm);
  animation:fadeSlideUp 0.8s 0.6s ease both;
  transition:box-shadow 0.25s;
}
.quote:hover{box-shadow:var(--shadow-md);}
.q-bar{width:4px;border-radius:4px;background:linear-gradient(180deg,var(--c),var(--p),var(--r));}
.q-text{font-size:1rem;font-weight:400;line-height:1.6;color:var(--tx);margin-bottom:8px;transition:opacity 0.4s;}
.q-auth{font-family:'Space Grotesk',monospace;font-size:0.7rem;font-weight:600;color:var(--c);}

/* ─────────────── DEVELOPER WATERMARK (Bottom-Right) ─────────────── */
.wm{
  position:fixed;bottom:24px;right:24px;z-index:100;
  text-align:right;
  font-family:'Space Grotesk',monospace;
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:12px 24px;
  border-radius:100px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-md);
  animation:watermarkGlow 3s ease-in-out infinite;
}
@keyframes watermarkGlow{
  0%,100%{box-shadow:0 8px 25px rgba(0,153,255,0.1),0 0 0 1px rgba(0,153,255,0.1);}
  50%{box-shadow:0 12px 35px rgba(0,153,255,0.25),0 0 0 2px rgba(0,153,255,0.2);}
}
.wm-r{
  display:block;font-size:0.45rem;letter-spacing:4px;
  color:var(--mu);margin-bottom:4px;
}
.wm-n{
  display:block;
  font-size:0.8rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;
  background:linear-gradient(135deg,var(--c),var(--p),var(--r));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:textShimmer 3s ease-in-out infinite;
}
@keyframes textShimmer{
  0%,100%{opacity:1;}
  50%{opacity:0.8;}
}

/* ─────────────── ANIMATIONS ─────────────── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}

/* ─────────────── RESPONSIVE ─────────────── */
@media(max-width:768px){
  .cd{grid-template-columns:repeat(2,1fr)}
  .stats{grid-template-columns:repeat(2,1fr)}
  .hud{display:none;}
  .control-bar{top:12px;right:12px;}
  .wm{bottom:16px;right:16px;padding:8px 16px;}
}
@media(max-width:480px){
  .wrap{padding:70px 12px 60px;}
  .badge{padding:6px 18px;font-size:0.6rem;}
  .wm{padding:6px 14px;}
  .wm-n{font-size:0.65rem;}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}
}
</style>
</head>
<body class="light-mode">

<canvas id="cvs"></canvas>
<div class="mesh"></div>

<!-- Control Bar - Top Right (Fixed) -->
<div class="control-bar">
  <button class="ctrl-btn" id="themeToggle"><i>🌙</i> <span data-i18n="theme">DARK</span></button>
  <button class="ctrl-btn" id="langToggle"><i>🌐</i> <span data-i18n="lang">বাংলা</span></button>
</div>

<!-- HUD - Top Left (Fixed) -->
<div class="hud">
  <div class="hud-item"><span class="hl" data-i18n="localTime">Local Time</span><span class="hv c" id="hud-time">--:--</span></div>
  <div class="hud-sep"></div>
  <div class="hud-item"><span class="hl" data-i18n="todayDate">Today's Date</span><span class="hv" id="hud-date">-- --- ----</span></div>
  <div class="hud-sep"></div>
  <div class="hud-item">
    <span class="hl"><span class="weather-icon" id="weather-icon">☀️</span> <span data-i18n="weather">Weather</span></span>
    <span class="hv" id="weather-temp">--°C</span>
  </div>
</div>

<div class="wrap">
  <div class="badge"><div class="bd"></div><span data-i18n="badge">HSC 2026 Coming — Study Now</span></div>
  <h1 class="title"><span data-i18n="mission">MISSION</span><br><span class="tc">HSC</span> <span class="tr">26</span></h1>
  <p class="sub"><span data-i18n="comingOn">COMING ON →</span> <span id="targetDateDisplay">2 JULY 2026 — 10:00 AM</span></p>
  <div class="divider"></div>

  <div class="cd">
    <div class="card"><span class="card-idx">01</span><div class="num-wrap"><span class="card-num" id="days">0</span></div><div class="card-lbl" data-i18n="days">Days</div></div>
    <div class="card"><span class="card-idx">02</span><div class="num-wrap"><span class="card-num" id="hours">00</span></div><div class="card-lbl" data-i18n="hours">Hours</div></div>
    <div class="card"><span class="card-idx">03</span><div class="num-wrap"><span class="card-num" id="minutes">00</span></div><div class="card-lbl" data-i18n="minutes">Minutes</div></div>
    <div class="card card-sec"><span class="card-idx">04</span><div class="num-wrap"><span class="card-num" id="seconds">00</span></div><div class="card-lbl" data-i18n="seconds">Seconds</div></div>
  </div>

  <div class="prog">
    <div class="prog-head"><span class="prog-lbl" data-i18n="progress">OVERALL PROGRESS</span><span class="prog-pct" id="bar-pct">0.00%</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="stats">
    <div class="stat"><span class="stat-v" id="st-h">—</span><span class="stat-l" data-i18n="hoursLeft">Hours Left</span></div>
    <div class="stat"><span class="stat-v" id="st-m">—</span><span class="stat-l" data-i18n="minutesLeft">Minutes Left</span></div>
    <div class="stat"><span class="stat-v" id="st-w">—</span><span class="stat-l" data-i18n="weeksLeft">Weeks Left</span></div>
    <div class="stat"><span class="stat-v" id="st-s">—</span><span class="stat-l" data-i18n="secondsLeft">Seconds Left</span></div>
  </div>

  <div class="quote"><div class="q-bar"></div><div style="flex:1"><p class="q-text" id="qt"></p><p class="q-auth" id="qa"></p></div></div>
</div>

<!-- Developer Watermark - Bottom Right (Fixed) -->
<div class="wm">
  <span class="wm-r">DEVELOPED BY</span>
  <span class="wm-n">Shahriar Naim Or Rashid</span>
</div>

<script>
  (function(){
    "use strict";
    
    /* ════════════════════════════════════════════════════════════════════
       RGB MINI PARTICLES - Colorful animated background
    ════════════════════════════════════════════════════════════════════ */
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let W, H, particles = [];
    const prefersReduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    
    const colors = [
      'rgba(255, 51, 102, 0.4)', 'rgba(0, 153, 255, 0.4)', 'rgba(255, 170, 0, 0.4)',
      'rgba(139, 92, 246, 0.4)', 'rgba(0, 255, 200, 0.4)', 'rgba(255, 80, 150, 0.4)'
    ];
    
    const getParticleCount = () => {
      const w = window.innerWidth;
      if (w < 480) return 25; if (w < 768) return 35; if (w < 1280) return 50; return 70;
    };
    
    function resizeCanvas() {
      W = cvs.width = window.innerWidth;
      H = cvs.height = window.innerHeight;
      const targetCount = getParticleCount();
      if (particles.length !== targetCount) {
        particles = Array.from({ length: targetCount }, () => new RGBParticle());
      }
    }
    window.addEventListener('resize', resizeCanvas);
    
    class RGBParticle {
      constructor() { this.reset(); this.color = colors[Math.floor(Math.random() * colors.length)]; }
      reset() {
        this.x = Math.random() * W; this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.3;
        this.size = Math.random() * 2 + 1;
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 0) this.x = W; if (this.x > W) this.x = 0;
        if (this.y < 0) this.y = H; if (this.y > H) this.y = 0;
        if (Math.random() < 0.01) { this.vx += (Math.random() - 0.5) * 0.1; this.vy += (Math.random() - 0.5) * 0.1; }
        const speed = Math.hypot(this.vx, this.vy);
        if (speed > 0.5) { this.vx *= 0.5 / speed; this.vy *= 0.5 / speed; }
      }
      draw() {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill();
        ctx.shadowColor = this.color.replace('0.4', '0.6'); ctx.shadowBlur = 8; ctx.fill(); ctx.shadowBlur = 0;
      }
    }
    
    resizeCanvas();
    
    if (!prefersReduced) {
      let lastTimestamp = 0; const fpsInterval = 1000 / 30;
      function animationLoop(now) {
        requestAnimationFrame(animationLoop);
        if (now - lastTimestamp < fpsInterval) return;
        lastTimestamp = now;
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < 100) {
              ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(150, 150, 255, ${(1 - dist / 100) * 0.15})`; ctx.lineWidth = 0.5; ctx.stroke();
            }
          }
          particles[i].update(); particles[i].draw();
        }
      }
      requestAnimationFrame(animationLoop);
    }

    /* ─────────────── WEATHER ─────────────── */
    const weatherIcon = document.getElementById('weather-icon'), weatherTemp = document.getElementById('weather-temp');
    const weatherConditions = [
      { icon: '☀️', temp: 28 }, { icon: '⛅', temp: 25 }, { icon: '☁️', temp: 22 },
      { icon: '🌧️', temp: 20 }, { icon: '🌤️', temp: 26 }
    ];
    function updateWeather() {
      const hour = new Date().getHours(); let idx;
      if (hour >= 6 && hour < 10) idx = 4; else if (hour >= 10 && hour < 16) idx = 0;
      else if (hour >= 16 && hour < 19) idx = 1; else idx = 2;
      const w = weatherConditions[idx]; weatherIcon.textContent = w.icon; weatherTemp.textContent = `${w.temp}°C`;
    }
    updateWeather(); setInterval(updateWeather, 60000);

    /* ─────────────── FLIP ─────────────── */
    const busy = new WeakSet(); const motionSafe = !prefersReduced;
    function flipNum(el, newVal) {
      if (el.textContent === newVal) return;
      if (!motionSafe || busy.has(el)) { el.textContent = newVal; return; }
      busy.add(el); el.classList.add('flip-out');
      setTimeout(() => { el.textContent = newVal; el.classList.remove('flip-out'); el.classList.add('flip-in');
        setTimeout(() => { el.classList.remove('flip-in'); busy.delete(el); }, 250); }, 180);
    }

    /* ─────────────── COUNTDOWN ─────────────── */
    const TARGET = new Date('July 2, 2026 10:00:00').getTime(), START = new Date('April 18, 2026 00:00:00').getTime();
    let prev = { d: null, h: null, m: null }; const pad = n => String(Math.floor(n)).padStart(2, '0');
    const elDays = document.getElementById('days'), elHrs = document.getElementById('hours'), elMin = document.getElementById('minutes'), elSec = document.getElementById('seconds');
    const elFill = document.getElementById('prog-fill'), elPct = document.getElementById('bar-pct');
    const elH = document.getElementById('st-h'), elM = document.getElementById('st-m'), elW = document.getElementById('st-w'), elS = document.getElementById('st-s');

    function tick() {
      const now = Date.now(), dist = TARGET - now, total = TARGET - START;
      if (dist <= 0) {
        document.querySelector('.wrap').innerHTML = `<div style="text-align:center"><h1 style="font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,12vw,7rem);color:var(--c);">${i18nText('missionAccomplished')}</h1><p style="color:var(--mu);margin-top:20px;">${i18nText('examDay')}</p></div>`;
        return;
      }
      const d = Math.floor(dist / 86400000), h = Math.floor((dist % 86400000) / 3600000), m = Math.floor((dist % 3600000) / 60000), s = Math.floor((dist % 60000) / 1000);
      const dS = String(d), hS = pad(h), mS = pad(m), sS = pad(s);
      if (dS !== prev.d) { flipNum(elDays, dS); prev.d = dS; } if (hS !== prev.h) { flipNum(elHrs, hS); prev.h = hS; } if (mS !== prev.m) { flipNum(elMin, mS); prev.m = mS; }
      elSec.textContent = sS;
      const pct = Math.min(((total - dist) / total) * 100, 100); elFill.style.width = pct + '%'; elPct.textContent = pct.toFixed(4) + '%';
      elH.textContent = Math.floor(dist / 3600000).toLocaleString(); elM.textContent = Math.floor(dist / 60000).toLocaleString(); elW.textContent = Math.floor(d / 7); elS.textContent = Math.floor(dist / 1000).toLocaleString();
      const nowDate = new Date();
      document.getElementById('hud-time').textContent = nowDate.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      document.getElementById('hud-date').textContent = nowDate.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }).toUpperCase();
    }
    setInterval(tick, 1000); tick();

    /* ─────────────── QUOTES ─────────────── */
    const quotes = [ { t: "Success is the sum of small efforts, repeated day in and day out.", a: "Robert Collier" }, { t: "The secret of getting ahead is getting started — start right now.", a: "Mark Twain" }, { t: "Don't watch the clock. Do what it does — keep going.", a: "Sam Levenson" }, { t: "Your future is created by what you do today, not tomorrow.", a: "Robert Kiyosaki" }, { t: "Believe you can and you're halfway there.", a: "Theodore Roosevelt" }, { t: "Push yourself, because no one else is going to do it for you.", a: "Unknown" } ];
    let qi = 0; const qtEl = document.getElementById('qt'), qaEl = document.getElementById('qa');
    function nextQuote() { const q = quotes[qi % quotes.length]; qtEl.style.opacity = '0'; qtEl.style.transform = 'translateY(8px)'; setTimeout(() => { qtEl.textContent = '“' + q.t + '”'; qaEl.textContent = '— ' + q.a; qtEl.style.opacity = '1'; qtEl.style.transform = ''; }, 400); qi++; }
    nextQuote(); setInterval(nextQuote, 9500);

    /* ─────────────── i18n ─────────────── */
    const i18n = { en: { theme:'DARK',lang:'বাংলা',localTime:'Local Time',todayDate:'Today\'s Date',weather:'Weather',badge:'HSC 2026 Coming — Study Now',mission:'MISSION',comingOn:'COMING ON →',days:'Days',hours:'Hours',minutes:'Minutes',seconds:'Seconds',progress:'OVERALL PROGRESS',hoursLeft:'Hours Left',minutesLeft:'Minutes Left',weeksLeft:'Weeks Left',secondsLeft:'Seconds Left',missionAccomplished:'MISSION<br>ACCOMPLISHED',examDay:'HSC 2026 — EXAM DAY HAS ARRIVED',targetDate:'2 JULY 2026 — 10:00 AM' }, bn: { theme:'DARK',lang:'English',localTime:'স্থানীয় সময়',todayDate:'আজকের তারিখ',weather:'আবহাওয়া',badge:'এইচএসসি ২০২৬ আসছে — এখনই পড়ুন',mission:'মিশন',comingOn:'শুরু হচ্ছে →',days:'দিন',hours:'ঘন্টা',minutes:'মিনিট',seconds:'সেকেন্ড',progress:'সার্বিক অগ্রগতি',hoursLeft:'বাকি ঘন্টা',minutesLeft:'বাকি মিনিট',weeksLeft:'বাকি সপ্তাহ',secondsLeft:'বাকি সেকেন্ড',missionAccomplished:'মিশন<br>সফল',examDay:'এইচএসসি ২০২৬ — পরীক্ষার দিন এসে গেছে',targetDate:'২ জুলাই ২০২৬ — সকাল ১০:০০' } };
    let currentLang = 'en'; function i18nText(key) { return i18n[currentLang][key] || key; }
    function updateUIText() { document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (key) el.textContent = i18nText(key); }); document.getElementById('targetDateDisplay').textContent = i18nText('targetDate'); document.querySelector('#langToggle span').textContent = i18nText('lang'); document.querySelector('#themeToggle span').textContent = i18nText('theme'); document.querySelector('.badge span').textContent = i18nText('badge'); }
    document.getElementById('langToggle').addEventListener('click', () => { currentLang = currentLang === 'en' ? 'bn' : 'en'; document.documentElement.lang = currentLang; updateUIText(); });

    /* ─────────────── THEME ─────────────── */
    const themeToggle = document.getElementById('themeToggle'), body = document.body, themeIcon = themeToggle.querySelector('i');
    function setTheme(isDark) { if (isDark) { body.classList.add('dark-mode'); body.classList.remove('light-mode'); themeIcon.textContent = '☀️'; themeToggle.querySelector('span').textContent = 'LIGHT'; } else { body.classList.remove('dark-mode'); body.classList.add('light-mode'); themeIcon.textContent = '🌙'; themeToggle.querySelector('span').textContent = 'DARK'; } }
    setTheme(false); themeToggle.addEventListener('click', () => { setTheme(!body.classList.contains('dark-mode')); });
    updateUIText();
  })();
</script>
</body>
</html>
