<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC 2026 - SHAHRIAR NAIM SPECIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff0055;
            --deep-dark: #000000;
            --card-bg: rgba(10, 10, 10, 0.7);
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--deep-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Particles Background Effect */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            animation: starsAnim 100s linear infinite;
        }

        @keyframes starsAnim {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 1100px;
            text-align: center;
        }

        /* Premium Title */
        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin-bottom: 5px;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .target-label {
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            letter-spacing: 6px;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* Countdown Grid */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .unit-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 35px 20px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .unit-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1.5px;
            background: linear-gradient(135deg, var(--primary), transparent, var(--accent));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-mask(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.2;
            transition: opacity 0.3s;
        }

        .unit-card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .unit-card:hover::before {
            opacity: 1;
        }

        .value {
            font-size: clamp(3rem, 7vw, 5rem);
            font-weight: 800;
            line-height: 1;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(180deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Pulse for seconds */
        #seconds-card .value {
            background: linear-gradient(180deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5) drop-shadow(0 0 15px var(--accent)); }
            100% { filter: brightness(1); }
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #666;
            margin-top: 15px;
        }

        /* Dynamic Progress Section */
        .progress-box {
            background: rgba(255,255,255,0.02);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .bar-container {
            height: 8px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 20px var(--primary);
            transition: width 1.5s ease;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #888;
        }

        /* Watermark Styles */
        .watermark {
            position: fixed;
            bottom: 30px;
            right: 40px;
            text-align: right;
        }

        .name {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: blinker 2s infinite linear;
        }

        @keyframes blinker {
            0% { color: var(--primary); text-shadow: 0 0 5px var(--primary); }
            50% { color: var(--accent); text-shadow: 0 0 20px var(--accent); }
            100% { color: var(--primary); text-shadow: 0 0 5px var(--primary); }
        }

        .role {
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: #444;
            display: block;
        }

        /* Responsive Grid for Mobile */
        @media (max-width: 600px) {
            .countdown-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .unit-card { padding: 20px 10px; }
            .watermark { bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <h1>MISSION HSC 26</h1>
        <p class="target-label">09:00 AM • 16 JULY 2026</p>

        <div class="countdown-grid">
            <div class="unit-card">
                <div class="value" id="days">000</div>
                <div class="label">Days</div>
            </div>
            <div class="unit-card">
                <div class="value" id="hours">00</div>
                <div class="label">Hours</div>
            </div>
            <div class="unit-card">
                <div class="value" id="minutes">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="unit-card" id="seconds-card">
                <div class="value" id="seconds">00</div>
                <div class="label">Seconds</div>
            </div>
        </div>

        <div class="progress-box">
            <div class="bar-container">
                <div class="bar-fill" id="progress-bar"></div>
            </div>
            <div class="stats">
                <span id="percent">0.00%</span>
                <span>MISSION PROGRESS</span>
            </div>
        </div>
    </div>

    <div class="watermark">
        <span class="role">DEVELOPED BY</span>
        <span class="name">SHAHRIAR NAIM OR RASHID</span>
    </div>

    <script>
        const targetDate = new Date("July 16, 2026 09:00:00").getTime();
        const startDate = new Date("February 24, 2026 00:00:00").getTime();

        function update() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            const total = targetDate - startDate;

            if (distance < 0) {
                document.querySelector(".container").innerHTML = "<h1>MISSION ACCOMPLISHED</h1>";
                return;
            }

            // Calculations
            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            // Update DOM
            document.getElementById("days").innerText = d.toString().padStart(3, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            // Progress
            const progress = ((total - distance) / total) * 100;
            const safeProgress = Math.max(0, Math.min(progress, 100));
            document.getElementById("progress-bar").style.width = safeProgress + "%";
            document.getElementById("percent").innerText = safeProgress.toFixed(4) + "%";
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
